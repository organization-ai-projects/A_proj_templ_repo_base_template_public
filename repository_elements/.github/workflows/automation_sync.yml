name: Automation - Sync main to dev

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: sync-main-to-dev
  cancel-in-progress: false

jobs:
  sync-main-to-dev:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      SYNC_BRANCH: sync/main-into-dev
      SOURCE_BRANCH: main
      TARGET_BRANCH: dev

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.BOT_APP_ID }}
          private_key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Export tokens
        run: |
          echo "APP_GH_TOKEN=${{ steps.app-token.outputs.token }}" >> $GITHUB_ENV
          echo "GH_TOKEN=${{ steps.app-token.outputs.token }}" >> $GITHUB_ENV

      - name: Create or update sync branch
        run: |
          SOURCE_SHA="$(gh api "repos/${{ github.repository }}/git/ref/heads/${SOURCE_BRANCH}" --jq '.object.sha')"

          if gh api "repos/${{ github.repository }}/git/ref/heads/${SYNC_BRANCH}" >/dev/null 2>&1; then
            gh api \
              --method PATCH \
              "repos/${{ github.repository }}/git/refs/heads/${SYNC_BRANCH}" \
              -f sha="${SOURCE_SHA}" \
              -F force=true
          else
            gh api \
              --method POST \
              "repos/${{ github.repository }}/git/refs" \
              -f ref="refs/heads/${SYNC_BRANCH}" \
              -f sha="${SOURCE_SHA}"
          fi

      - name: Create sync pull request if missing
        run: |
          PR_NUMBER="$(gh pr list \
            --repo "${{ github.repository }}" \
            --state open \
            --head "${SYNC_BRANCH}" \
            --base "${TARGET_BRANCH}" \
            --json number \
            --jq '.[0].number')"

          if [ -n "${PR_NUMBER}" ] && [ "${PR_NUMBER}" != "null" ]; then
            echo "Sync pull request already exists: #${PR_NUMBER}"
            echo "PR_NUMBER=${PR_NUMBER}" >> "$GITHUB_ENV"
            exit 0
          fi

          PR_URL="$(gh pr create \
            --repo "${{ github.repository }}" \
            --base "${TARGET_BRANCH}" \
            --head "${SYNC_BRANCH}" \
            --title "Sync ${SOURCE_BRANCH} into ${TARGET_BRANCH}" \
            --body "Automated sync pull request from \`${SOURCE_BRANCH}\` into \`${TARGET_BRANCH}\`.")"

          PR_NUMBER="$(gh pr view \
            --repo "${{ github.repository }}" \
            "${SYNC_BRANCH}" \
            --json number \
            --jq '.number')"

          echo "Created sync pull request: ${PR_URL}"
          echo "PR_NUMBER=${PR_NUMBER}" >> "$GITHUB_ENV"

      - name: Apply labels and merge sync pull request
        run: |
          if [ -z "${PR_NUMBER}" ] || [ "${PR_NUMBER}" = "null" ]; then
            echo "PR_NUMBER is missing."
            exit 1
          fi

          gh pr edit \
            --repo "${{ github.repository }}" \
            "${PR_NUMBER}" \
            --add-label automation \
            --add-label pull-request

          MERGEABLE="$(gh pr view \
            --repo "${{ github.repository }}" \
            "${PR_NUMBER}" \
            --json mergeable \
            --jq '.mergeable')"

          MERGE_STATE_STATUS="$(gh pr view \
            --repo "${{ github.repository }}" \
            "${PR_NUMBER}" \
            --json mergeStateStatus \
            --jq '.mergeStateStatus')"

          if [ "${MERGEABLE}" = "MERGEABLE" ] && [ "${MERGE_STATE_STATUS}" = "CLEAN" ]; then
            gh pr merge \
              --repo "${{ github.repository }}" \
              "${PR_NUMBER}" \
              --merge --delete-branch
          else
            gh pr merge \
              --repo "${{ github.repository }}" \
              "${PR_NUMBER}" \
              --auto --merge --delete-branch
          fi
